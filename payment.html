<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GentsConcerts - Complete Payment</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/api.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <h1>GentsConcerts</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="events.html">Events</a></li>
                    <li><a href="tickets.html">My Tickets</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="payment-section">
            <h2>Complete Your Payment</h2>
            <div id="payment-details">
                <p>Event: <span id="event-title"></span></p>
                <p>Ticket Type: <span id="ticket-type"></span></p>
                <p>Quantity: <span id="ticket-quantity"></span></p>
                <p>Total Amount: <span id="total-amount"></span></p>
            </div>

            <form id="payment-form">
                <label for="phone-number">MTN Mobile Money Phone Number:</label>
                <input type="tel" id="phone-number" placeholder="e.g., 231xxxxxxxxx" required>
                <button type="submit">Initiate Payment</button>
            </form>

            <div id="payment-status" style="display: none;">
                <p id="status-message"></p>
                <div id="qr-code-container" style="display: none;"></div>
            </div>

            <div id="payment-error" style="display: none;">
                <p id="error-message" style="color: red;"></p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 GentsConcerts. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const eventId = urlParams.get("eventId");
            const ticketType = urlParams.get("ticketType");
            const quantity = urlParams.get("quantity");
            const totalAmount = urlParams.get("totalAmount");

            // Fetch event details from Supabase
            if (eventId && window.gentsApi) {
                window.gentsApi.getEvent(eventId).then(event => {
                    if (event) {
                        document.getElementById("event-title").textContent = event.name;
                    }
                }).catch(err => {
                    console.error("Error fetching event for payment:", err);
                    document.getElementById("event-title").textContent = eventId;
                });
            }
            
            document.getElementById("ticket-type").textContent = ticketType;
            document.getElementById("ticket-quantity").textContent = quantity;
            document.getElementById("total-amount").textContent = totalAmount + " USD";

            const paymentForm = document.getElementById("payment-form");
            const paymentStatusDiv = document.getElementById("payment-status");
            const statusMessage = document.getElementById("status-message");
            const qrCodeContainer = document.getElementById("qr-code-container");
            const paymentErrorDiv = document.getElementById("payment-error");
            const errorMessage = document.getElementById("error-message");

            let pollingInterval;

            paymentForm.addEventListener("submit", async (e) => {
                e.preventDefault();
                const phoneNumber = document.getElementById("phone-number").value;

                paymentStatusDiv.style.display = "none";
                qrCodeContainer.style.display = "none";
                paymentErrorDiv.style.display = "none";

                statusMessage.textContent = "Initiating payment...";
                paymentStatusDiv.style.display = "block";

                try {
                    // Call backend to initiate payment
                    const response = await fetch("/api/payments/initiate", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${localStorage.getItem("token")}` // Assuming token is stored in localStorage
                        },
                        body: JSON.stringify({
                            amount: parseFloat(totalAmount), // Ensure amount is a number
                            currency: "EUR",
                            phoneNumber: phoneNumber,
                            externalId: eventId, // Using eventId as externalId for now, should be ticket._id
                            description: `Ticket purchase for ${eventId}`
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        const referenceId = data.referenceId;
                        statusMessage.textContent = "Payment request sent to your phone. Please approve on your MTN phone.";
                        
                        // Start polling for payment status
                        let pollCount = 0;
                        const maxPolls = 24; // 2 minutes (5 seconds * 24 = 120 seconds)

                        pollingInterval = setInterval(async () => {
                            pollCount++;
                            if (pollCount > maxPolls) {
                                clearInterval(pollingInterval);
                                statusMessage.textContent = "Payment timed out. Please try again.";
                                return;
                            }

                            const statusResponse = await fetch(`/api/payments/status/${referenceId}`, {
                                headers: {
                                    "Authorization": `Bearer ${localStorage.getItem("token")}`
                                }
                            });
                            const statusData = await statusResponse.json();

                                    if (response.ok && statusData.status && statusData.status.status === "SUCCESSFUL") {
                                        clearInterval(pollingInterval);
                                        statusMessage.textContent = "Payment successful! Saving your ticket...";
                                        
                                        // Save order to Supabase
                                        try {
                                            await window.gentsApi.purchaseOrder({
                                                phone_number: phoneNumber,
                                                event_id: eventId,
                                                ticket_type: ticketType,
                                                quantity: parseInt(quantity),
                                                total_price: parseFloat(totalAmount),
                                                payment_reference: referenceId,
                                                status: 'active'
                                            });
                                            
                                            statusMessage.textContent = "Payment successful! Your ticket is saved to your profile.";
                                            qrCodeContainer.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=GentsConcertsTicket-${referenceId}" alt="QR Code">`;
                                            qrCodeContainer.style.display = "block";
                                        } catch (dbErr) {
                                            console.error("Error saving ticket to DB:", dbErr);
                                            statusMessage.textContent = "Payment successful, but there was an error saving your ticket. Please contact support.";
                                        }
                                    }
                            }
                        }, 5000); // Poll every 5 seconds

                    } else {
                        paymentErrorDiv.style.display = "block";
                        errorMessage.textContent = data.message || "Failed to initiate payment.";
                        paymentStatusDiv.style.display = "none";
                    }
                } catch (error) {
                    console.error("Frontend payment initiation error:", error);
                    paymentErrorDiv.style.display = "block";
                    errorMessage.textContent = "An unexpected error occurred. Please try again.";
                    paymentStatusDiv.style.display = "none";
                }
            });
        });
    </script>
</body>
</html>
