[build]
  command = "cd gentsconcerts-app && npm install && npx expo export --platform web"
  publish = "gentsconcerts-app/dist"

[context.production.environment]
  EXPO_PUBLIC_API_URL = "https://gentsconcerts-api.onrender.com/api"

[context.deploy-preview.environment]
  EXPO_PUBLIC_API_URL = "https://gentsconcerts-api.onrender.com/api"
