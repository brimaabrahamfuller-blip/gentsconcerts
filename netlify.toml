[build]
  command = "npm install && npx expo export --platform web"
  publish = "dist"
  base = "gentsconcerts-app"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  EXPO_PUBLIC_API_URL = "https://gentsconcerts-api.onrender.com/api"

[context.deploy-preview.environment]
  EXPO_PUBLIC_API_URL = "https://gentsconcerts-api.onrender.com/api"
